[env:proton]
platform = https://github.com/norandomtechie/platform-raspberrypi#feature/proton-picosdk-support
board = proton
framework = picosdk
build_src_filter = +<main.c> +<spi_display.c>
build_src_flags = -O0
debug_tool = picoprobe
upload_protocol = picoprobe
monitor_speed = 115200
lib_deps = 
	lvgl/lvgl@^9.3.0
build_flags = 
	-I include
