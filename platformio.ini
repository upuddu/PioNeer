[env:proton]
platform = https://github.com/norandomtechie/platform-raspberrypi#feature/proton-picosdk-support
board = proton
framework = picosdk
build_src_filter = +<main.c> +<gpio_buttons.c> +<led_strip.c>
build_src_flags = -O0
build_flags =
    -DPICO_RP2350=1
    -std=gnu11
debug_tool = picoprobe
upload_protocol = picoprobe
targets = upload
monitor_speed = 115200


lib_compat_mode = off
