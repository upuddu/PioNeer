[env:proton]
platform = https://github.com/norandomtechie/platform-raspberrypi#feature/proton-picosdk-support
board = proton
framework = picosdk
build_src_filter = +<main.c> +<sd_api.c>
build_src_flags = -O0
debug_tool = picoprobe
upload_protocol = picoprobe
monitor_speed = 115200

lib_deps = 
    carlk3/no-OS-FatFS-SD-SDIO-SPI-RPi-Pico@^3.5.1
lib_compat_mode = off
lib_ldf_mode = chain+
build_flags = 
    -I include
    -I src