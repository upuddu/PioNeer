[env:rp2350a_feather]
platform = https://github.com/norandomtechie/platform-raspberrypi#feature/proton-picosdk-support
board = adafruit_feather_rp2350_hstx
framework = picosdk

; ── Source file selection ─────────────────────────────────────────────────────
; Include every .c in src/ EXCEPT the ones we don't need for peripheral testing.
build_src_filter =
    +<*.c>
    -<adc_joystick.c>          ; replaced by i2c_joystick.c
    -<spi_display.c>           ; replaced by hstx_display.c
    -<self_test.c>             ; standalone test, not needed
    -<ui.c>                    ; LVGL UI layer, not needed yet
    -<sd_api.c>                ; SD card, not needed yet
    -<audio.c>                 ; legacy PWM audio, replaced by i2s_audio.c
    +<${platformio.packages_dir}/framework-picosdk/src/rp2_common/hardware_flash/flash.c>
    +<${platformio.packages_dir}/framework-picosdk/src/rp2_common/hardware_xip_cache/xip_cache.c>

build_src_flags = -O0
upload_protocol = picotool
monitor_speed = 115200

; ── Library dependencies ──────────────────────────────────────────────────────
; NOTE: lvgl and FatFS are kept so the filter_libs.py script doesn't break,
;       but they won't link unless the ui.c / sd_api.c source files are included.
lib_deps =
    lvgl/lvgl
    carlk3/no-OS-FatFS-SD-SDIO-SPI-RPi-Pico@^3.5.1
lib_compat_mode = off
lib_ldf_mode = chain+

build_flags =
    -I .pio/libdeps
    -I .pio/libdeps/rp2350a_feather
    -I include
    -I src
    -D LV_CONF_INCLUDE_SIMPLE
    -D PICO_STDIO_UART=1
    -D PICO_STDIO_USB=0
    -I ${platformio.packages_dir}/framework-picosdk/src/rp2_common/hardware_flash/include
    -I ${platformio.packages_dir}/framework-picosdk/src/rp2_common/hardware_xip_cache/include
    -I ${platformio.packages_dir}/framework-picosdk/src/rp2_common/hardware_dma/include

extra_scripts = pre:filter_libs.py